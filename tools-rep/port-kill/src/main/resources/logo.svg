<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="#DC3545" opacity="0.15"/>

  <!-- Power / kill icon outer ring -->
  <path d="M24 6
           A18 18 0 1 1 6.54 33"
        fill="none" stroke="#DC3545" stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- Power button vertical line -->
  <line x1="24" y1="6" x2="24" y2="22"
        stroke="#DC3545" stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- Port plug symbol – two small circles at bottom -->
  <circle cx="19" cy="34" r="2.2" fill="#DC3545"/>
  <circle cx="29" cy="34" r="2.2" fill="#DC3545"/>

  <!-- Connector body -->
  <rect x="15" y="36" width="18" height="5" rx="2.5"
        fill="#DC3545" opacity="0.85"/>
</svg>

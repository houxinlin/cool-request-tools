<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background rounded square -->
  <rect x="2" y="2" width="44" height="44" rx="10" ry="10" fill="#1A73E8" opacity="0.12"/>

  <!-- JSON curly braces { } -->
  <text x="4" y="22" font-family="monospace" font-size="15" font-weight="bold" fill="#1A73E8">{}</text>

  <!-- Arrow pointing right -->
  <line x1="13" y1="30" x2="33" y2="30" stroke="#1A73E8" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="29,26 34,30 29,34" fill="none" stroke="#1A73E8" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Target format icon: stacked lines representing a table/document -->
  <rect x="30" y="8" width="15" height="18" rx="2" fill="none" stroke="#34A853" stroke-width="2"/>
  <line x1="32" y1="13" x2="43" y2="13" stroke="#34A853" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="17" x2="43" y2="17" stroke="#34A853" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="21" x2="43" y2="21" stroke="#34A853" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Small multi-format badges at bottom -->
  <rect x="2"  y="36" width="10" height="9" rx="2" fill="#EA4335" opacity="0.85"/>
  <rect x="14" y="36" width="10" height="9" rx="2" fill="#FBBC04" opacity="0.85"/>
  <rect x="26" y="36" width="10" height="9" rx="2" fill="#34A853" opacity="0.85"/>
  <rect x="38" y="36" width="8"  height="9" rx="2" fill="#1A73E8" opacity="0.85"/>

  <text x="3"  y="44" font-family="sans-serif" font-size="5.5" font-weight="bold" fill="white">SQL</text>
  <text x="15" y="44" font-family="sans-serif" font-size="5.5" font-weight="bold" fill="white">CSV</text>
  <text x="27" y="44" font-family="sans-serif" font-size="5.5" font-weight="bold" fill="white">MD</text>
  <text x="39" y="44" font-family="sans-serif" font-size="5.5" font-weight="bold" fill="white">YML</text>
</svg>
